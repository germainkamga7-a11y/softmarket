name: camermarket
description: CamerMarket - Marketplace Flutter avec Maps et Firebase
publish_to: 'none'
version: 1.1.0+3

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.6
  material_symbols_icons: ^4.2719.3

  # Google Maps
  google_maps_flutter: ^2.16.0
  google_maps_flutter_web: ^0.6.2

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.2
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^18.0.0

  # State management
  provider: ^6.1.1

  # Utils
  shared_preferences: ^2.3.2
  geolocator: ^10.1.0
  cached_network_image: ^3.3.1
  image_picker: ^1.0.7
  intl: ^0.20.2
  url_launcher: ^6.2.4
  share_plus: ^10.1.4

  # Camera & ML Kit OCR
  camera: ^0.10.5+5
  google_mlkit_text_recognition: ^0.15.1
  firebase_crashlytics: ^4.3.10
  google_sign_in: ^7.2.0
  firebase_analytics: ^11.6.0
  go_router: ^17.1.0
  connectivity_plus: ^7.0.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_native_splash: ^2.4.0
  flutter_launcher_icons: ^0.14.3

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/images/

flutter_native_splash:
  color: "#FF0000"
  image: assets/images/logo.png
  color_dark: "#FF0000"
  image_dark: assets/images/logo.png
  fullscreen: true
  android: true
  ios: true
  web: true
