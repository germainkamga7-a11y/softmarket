name: camermarket
description: CamerMarket - Marketplace Flutter avec Maps et Firebase
publish_to: 'none'
version: 1.0.0+2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.6
  material_symbols_icons: ^4.2719.3

  # Google Maps
  google_maps_flutter: ^2.5.3
  google_maps_flutter_web: ^0.5.4

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.2
  firebase_messaging: ^15.1.3

  # State management
  provider: ^6.1.1

  # Utils
  shared_preferences: ^2.3.2
  geolocator: ^10.1.0
  cached_network_image: ^3.3.1
  image_picker: ^1.0.7
  intl: ^0.19.0
  url_launcher: ^6.2.4

  # Camera & ML Kit OCR
  camera: ^0.10.5+5
  google_mlkit_text_recognition: ^0.15.1


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_native_splash: ^2.4.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_native_splash:
  color: "#CC0000"
  image: assets/images/splash_mobile.png
  color_dark: "#CC0000"
  image_dark: assets/images/splash_mobile.png
  fullscreen: true
  android: true
  ios: true
  web: false
