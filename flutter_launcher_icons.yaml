flutter_launcher_icons:
  # Image source (logo officiel CamerMarket)
  image_path: "logo.png"

  # Android
  android: true
  min_sdk_android: 21
  adaptive_icon_background: "#CC0000"
  adaptive_icon_foreground: "logo.png"

  # iOS
  ios: true
  remove_alpha_ios: true

  # Web (PWA)
  web:
    generate: true
    image_path: "logo.png"
    background_color: "#CC0000"
    theme_color: "#CC0000"

  # Windows
  windows:
    generate: true
    image_path: "logo.png"
    icon_size: 48

  # macOS
  macos:
    generate: true
    image_path: "logo.png"
